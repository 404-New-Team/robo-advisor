services:
  ai:
    build:
      context: .
      dockerfile: Dockerfile
    image: robo-advisor-ai:latest
    working_dir: /app
    environment:
      PYTHONPATH: /app
      MPLBACKEND: Agg
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./experiments/results:/app/experiments/results
      - ./.cache:/app/.cache
    command: ["python", "-m", "pytest", "tests"]

  serve:
    image: robo-advisor-ai:latest
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["serve"]
    working_dir: /app
    ports:
      - "8001:8001"
    environment:
      PYTHONPATH: /app
      MPLBACKEND: Agg
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./experiments/results:/app/experiments/results
      - ./.cache:/app/.cache
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8001"]

  train:
    image: robo-advisor-ai:latest
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["train"]
    working_dir: /app
    environment:
      PYTHONPATH: /app
      MPLBACKEND: Agg
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./experiments/results:/app/experiments/results
      - ./.cache:/app/.cache
    command: ["python", "train.py"]

  shap:
    image: robo-advisor-ai:latest
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["experiments"]
    working_dir: /app
    environment:
      PYTHONPATH: /app
      MPLBACKEND: Agg
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./experiments/results:/app/experiments/results
      - ./.cache:/app/.cache
    command: ["python", "experiments/shap_experiment.py"]
