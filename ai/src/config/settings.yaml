environment:
  # 해외 ETF/주식 7개 (yfinance) + 국내 ETF 3개 (pykrx 6자리)
  tickers: ["SPY", "QQQ", "GLD", "TLT", "EFA", "AAPL", "MSFT", "069500", "102110", "233740"]
  window_size: 20
  initial_balance: 1000000
  transaction_cost: 0.00015
  slippage: 0.0005
  max_drawdown_threshold: 0.15

risk:
  tag_names:
    - regulatory_risk
    - earnings_shock
    - geopolitical_risk
    - market_stress
    - liquidity_risk
  decay_rate: 0.95

reward:
  risk_penalty_lambda: 0.5
  drawdown_penalty_mu: 1.0

training:
  total_timesteps: 500000
  n_envs: 4
  batch_size: 256
  learning_rate: 0.0003

research:
  model: "claude-opus-4-7"
  max_tokens: 1024
  news_lookback_days: 3
