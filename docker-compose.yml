services:
  mysql:
    image: mysql:8.0
    container_name: robo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: roboadvisor
      MYSQL_USER: robo
      MYSQL_PASSWORD: robopassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: robo_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    image: robo-advisor-ai:latest
    container_name: robo_ai
    restart: unless-stopped
    working_dir: /app
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8002:8001"
    environment:
      PYTHONPATH: /app
      MPLBACKEND: Agg
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./ai/checkpoints:/app/checkpoints
      - ./ai/experiments/results:/app/experiments/results
      - ./ai/.cache:/app/.cache
    depends_on:
      - chromadb

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: robo-advisor-backend:latest
    container_name: robo_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: robo
      MYSQL_PASSWORD: robopassword
      MYSQL_DB: roboadvisor
      AI_SERVICE_URL: http://ai:8001
      AI_TIMEOUT: "5.0"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
    volumes:
      - ./backend/static:/app/static
    depends_on:
      mysql:
        condition: service_healthy
      ai:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: robo-advisor-frontend:latest
    container_name: robo_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://backend:8000
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    depends_on:
      - backend

volumes:
  mysql_data:
  chroma_data:
