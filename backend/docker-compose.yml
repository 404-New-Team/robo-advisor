services:
  mysql:
    image: mysql:8.0
    container_name: robo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: roboadvisor
      MYSQL_USER: robo
      MYSQL_PASSWORD: robopassword
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robo_backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: robo
      MYSQL_PASSWORD: robopassword
      MYSQL_DB: roboadvisor
      AI_SERVICE_URL: http://ai:8001
      AI_TIMEOUT: "5.0"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./static:/app/static

  adminer:
    image: adminer:latest
    container_name: robo_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
