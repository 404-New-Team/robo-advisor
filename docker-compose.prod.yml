services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB:-roboadvisor}
      MYSQL_USER: ${MYSQL_USER:-robo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  chromadb:
    image: chromadb/chroma:1.5.9
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    image: ${AI_IMAGE:-robo-advisor-ai:prod}
    restart: unless-stopped
    working_dir: /app
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      PYTHONPATH: /app
      MPLBACKEND: Agg
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      KRX_ID: ${KRX_ID:-}
      KRX_PW: ${KRX_PW:-}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    volumes:
      - ./ai/checkpoints:/app/checkpoints
      - ./ai/experiments/results:/app/experiments/results
      - ai_cache:/app/.cache
    depends_on:
      - chromadb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-robo-advisor-backend:prod}
    restart: unless-stopped
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-18080}:8000"
    networks:
      default:
      proxy:
        aliases:
          - robo-advisor-backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-robo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DB:-roboadvisor}
      AI_SERVICE_URL: http://ai:8001
      AI_TIMEOUT: ${AI_TIMEOUT:-30.0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
    volumes:
      - backend_static:/app/static
    depends_on:
      mysql:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-robo-advisor-frontend:prod}
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-18501}:8501"
    networks:
      default:
      proxy:
        aliases:
          - robo-advisor-frontend
    environment:
      API_BASE_URL: http://backend:8000
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  proxy:
    external: true

volumes:
  mysql_data:
  chroma_data:
  ai_cache:
  backend_static:
